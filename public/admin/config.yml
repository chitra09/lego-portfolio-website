backend:
  name: github
  repo: chitra09/lego-portfolio-website
  branch: main
  base_url: https://guha-lego-creations.vercel.app
  auth_endpoint: api/auth

site_url: https://guha-lego-creations.vercel.app

media_folder: "/public/creations"
public_folder: "/creations"

collections:
  - name: "creations"
    label: "Lego Creations"
    folder: "content/creations"
    create: true
    slug: "{{slug}}"
    media_folder: "/public/creations/{{slug}}"
    public_folder: "/creations/{{slug}}"
    identifier_field: title
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date Built", name: "date", widget: "string", pattern: ["^\\d{4}-\\d{2}-\\d{2}$", "Use YYYY-MM-DD, e.g. 2026-05-01"], hint: "Type it as YYYY-MM-DD, e.g. 2026-05-01" }
      - { label: "Theme", name: "theme", widget: "string", hint: "One category only, e.g. Star Wars — no commas (used as a single filter button)" }
      - { label: "Set Number", name: "setNumber", widget: "string", required: false, hint: "Leave blank for original (MOC) builds" }
      - { label: "Piece Count", name: "pieceCount", widget: "number", required: false, value_type: "int" }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Lowercase, one word/phrase per tag, e.g. starships" }
      - { label: "Cover Photo", name: "coverImage", widget: "image" }
      - { label: "Photo Gallery", name: "gallery", widget: "list", field: { label: "Photo", name: "image", widget: "image" } }
      - { label: "Videos", name: "videos", widget: "list", required: false, hint: "Short clips, e.g. MP4", field: { label: "Video", name: "video", widget: "file" } }
      - { label: "Story", name: "body", widget: "markdown", required: false }
